<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TruthScan - Python Backend</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; rounded: 1rem; border: 1px solid #334155; width: 400px; }
        textarea { w-full; background: #0f172a; color: white; border: 1px solid #334155; padding: 0.5rem; width: 100%; height: 100px; margin-bottom: 1rem; }
        button { background: #00e5ff; color: #0a0c10; font-weight: bold; border: none; padding: 0.75rem; width: 100%; border-radius: 0.5rem; cursor: pointer; }
        .result { margin-top: 1rem; padding: 1rem; border-radius: 0.5rem; background: #334155; }
    </style>
</head>
<body>
    <div class="card">
        <h1>TruthScan AI</h1>
        <form method="POST">
            {% csrf_token %}
            <textarea name="news_text" placeholder="Paste news here...">{{ news_text }}</textarea>
            <button type="submit">Analyze with BERT</button>
        </form>
        {% if result %}
            <div class="result">
                <strong>Verdict:</strong> {{ result.label }}<br>
                <strong>Confidence:</strong> {{ result.score }}%
            </div>
        {% endif %}
    </div>
</body>
</html>
